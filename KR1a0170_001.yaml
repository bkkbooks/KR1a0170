body:
  text: 易緯坤靈圖邱序曰天經曰乾元亨利貞爻曰飛龍在天利見大人謂易為天經者聖人所制作乾有四德飛龍在天此聖人以至德居天子位也序此之言説之也故德配天地天地不私公位稱之曰帝古者聖人德如此也不私公位不傳之子孫禪於能者與天同故以天稱之也故堯天之精陽萬物莫不從者故乾居西北乾用事萬物蟄伏致乎萬物蟄伏故能致乎萬人之化立天之道曰隂與陽言堯乃天之陽精所生所以能為明君而能假人也萬物蟄伏象施化功成人人化故然也經曰用九堯時賢聖為聖德化於天下故耳天之所首之故經以明之經曰震下乾上旡妄天精起起猶立乾為天震為長子天生長子聖人立為天子天下之人各得所天所獲旡妄也帝必有洪水之災天生聖人使殺之故言乃統天也初九震在子坎為水又年與艮同體艮為山水而漸山是大水為人害天故生聖君堯求命之是亦堯辜也與乾統天之功同邱括義因象助類辭曰天無雲而雷先王以茂對時育萬物茂勉也對遂育長也天之將雨先必興雲而後雷今乾在上下無坎而有震是以雷行天下無雲而雷洪水之時人苦雨之多故堯於是茂勉遂其教令以養萬物以是衆庶艱食得以糊口焉經曰乾下艮上大畜天災將至預畜而待之人免於飢故曰元亨按乾元序制記內賢子孫繼世而立云云疑此處注文上下皆通各載其性故曰利貞載之時言得值也言待堯養萬物將嵗不飢長幼情性人自各得如此也至德之萌五星若連珠日月如合璧天精起斗口有位雞鳴斗運行復始莫敢當之黃星笰于北斗必以戊巳日其先無芒行文元武動事莫之敢距按繹史引坤靈圖云伏羲立九部而民易理又云𧖟陽者火火惡水故食不飲桑者上之液木生火故𧖟以三月草頰會精合相食隋書引坤靈圖云河龍以正月辰見白龍與五黑龍鬬白龍陵故泰人有命鄭康成云陵當為除今皆無其文蓋此本非完書且有錯入乾元序制記萹內者
